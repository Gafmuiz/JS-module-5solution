<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Food LLC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-md bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" style="cursor:pointer" onclick="showHome()">FOOD LLC</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent"
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="collapse d-md-none" id="navbarToggleExternalContent" data-bs-theme="dark">
        <div class="bg-dark p-4">
            <ul class="nav flex-column justify-content-center align-items-center">
                <li class="nav-item"><a class="nav-link text-white" href="#" onclick="loadMenuItems('CH')">Chicken</a>
                </li>
                <li class="nav-item"><a class="nav-link text-white" href="#" onclick="loadMenuItems('BF')">Beef</a>
                </li>
                <li class="nav-item"><a class="nav-link text-white" href="#" onclick="loadMenuItems('SU')">Sushi</a>
                </li>
            </ul>
        </div>
    </div>

    <!-- HOME PAGE -->
    <div id="page-home" class="container mt-5">
        <h2 class="text-center mb-4">Welcome to Food LLC</h2>
        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="tile tile-menu" onclick="loadMenuItems('ALL')">🍽️ Menu</div>
            </div>
            <div class="col-12 col-md-4">
                <div class="tile tile-specials" onclick="loadRandomSpecials()">⭐ Specials</div>
            </div>
            <div class="col-12 col-md-4">
                <div class="tile tile-map" onclick="showMap()">🗺️ Map</div>
            </div>
        </div>
    </div>

    <!-- CATEGORY PAGE -->
    <div id="page-category" class="container mt-5" style="display:none">
        <button class="btn btn-secondary mb-4" onclick="showHome()">← Back</button>
        <h2 class="text-center mb-4" id="category-title"></h2>
        <div id="category-content"></div>
    </div>

    <!-- MAP PAGE -->
    <div id="page-map" class="container mt-5" style="display:none">
        <button class="btn btn-secondary mb-4" onclick="showHome()">← Back</button>
        <h2 class="text-center mb-4">Our Location</h2>
        <div class="ratio ratio-16x9">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.9476519598476!2d-73.99389908459418!3d40.74076104379132!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDQ0JzI3LjciTiA3M8KwNTknMzQuMiJX!5e0!3m2!1sen!2sus!4v1234567890"
                allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
